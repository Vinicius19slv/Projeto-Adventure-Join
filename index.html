<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adventure Join V15.2 - Final Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; background: #050507; 
            touch-action: none; user-select: none;
            width: 100vw; height: 100vh; position: fixed; font-family: sans-serif;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Botão de Iniciar (Evita travas de segurança do navegador) */
        #overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 20px 40px; font-size: 24px; font-weight: bold;
            color: white; background: #3498db; border: none; border-radius: 10px; cursor: pointer;
        }

        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 100; pointer-events: none; }
        .hp-val { font-size: 22px; font-weight: 900; }

        #pc-tut {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid #444; z-index: 200; pointer-events: none;
        }

        /* Controles */
        #controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 90; }
        .btn { 
            position: absolute; width: 70px; height: 70px; 
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 10px; font-weight: bold; pointer-events: auto;
        }
        #joy-bg { position: absolute; bottom: 40px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.7); border-radius: 50%; pointer-events: none; }
        #btn-jump { bottom: 130px; right: 30px; }
        #btn-roll { bottom: 40px; right: 30px; border-color: orange; }
        #btn-sprint { bottom: 40px; right: 120px; border-color: #ff6600; }
        #btn-atk1 { bottom: 130px; right: 120px; border-color: #00d4ff; display: none; }
        #btn-atk2 { bottom: 210px; right: 100px; border-color: #ff3333; display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <button id="start-btn">INICIAR AVENTURA</button>
    <p style="color: grey; margin-top: 15px;">(Clique para destravar os controles)</p>
</div>

<div id="ui">
    <div style="color: #44ff88;">HERÓI: <span id="hp-p">100</span></div>
    <div style="color: #ff4444;">INIMIGO: <span id="hp-e">50</span></div>
</div>

<div id="pc-tut">
    <h3 style="color: #00d4ff;">COMANDOS PC</h3>
    <p>WASD: Mover | Espaço: Pulo<br>K: Leve | L: Pesado | J: Roll</p>
</div>

<div id="controls">
    <div id="joy-bg"><div id="joy-stick"></div></div>
    <div id="btn-jump" class="btn">PULO</div>
    <div id="btn-roll" class="btn">ROLL</div>
    <div id="btn-sprint" class="btn">CORRER</div>
    <div id="btn-atk1" class="btn">LEVE</div>
    <div id="btn-atk2" class="btn">PESADO</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let gameRunning = false;

// Destravar jogo
document.getElementById('start-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'none';
    gameRunning = true;
    setTimeout(() => { document.getElementById('pc-tut').style.display = 'none'; }, 5000);
};

let player = { x:0, z:0, y:0, vY:0, ang:0, spd:4, hasW:false, atk:false, hp:100, flash:0 };
let enemy = { x:-300, z:300, hp:50, spd:1.5, cd:0, flash:0 };
let chest = { x:150, z:150, open:false };
let keys = {};
let joy = { id: null, x: 0, y: 0 };

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();

// Eventos Teclado
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

// Eventos Touch
const buttons = {
    jump: document.getElementById('btn-jump'),
    roll: document.getElementById('btn-roll'),
    sprint: document.getElementById('btn-sprint'),
    atk1: document.getElementById('btn-atk1'),
    atk2: document.getElementById('btn-atk2')
};

function handleTouch(e) {
    if(!gameRunning) return;
    const touches = e.touches;
    for(let t of touches) {
        const x = t.clientX, y = t.clientY;
        const jRect = document.getElementById('joy-bg').getBoundingClientRect();
        if(Math.hypot(x-(jRect.left+60), y-(jRect.top+60)) < 80 || joy.id === t.identifier) {
            joy.id = t.identifier;
            joy.x = Math.max(-40, Math.min(40, x-(jRect.left+60)));
            joy.y = Math.max(-40, Math.min(40, y-(jRect.top+60)));
            document.getElementById('joy-stick').style.transform = `translate(${joy.x}px,${joy.y}px)`;
        }
        // Botões
        Object.keys(buttons).forEach(k => {
            const r = buttons[k].getBoundingClientRect();
            if(x > r.left && x < r.right && y > r.top && y < r.bottom) {
                if(k === 'jump' && player.y === 0) player.vY = 12;
                if(k === 'atk1') attack(6, 100);
                if(k === 'atk2') attack(12, 130);
            }
        });
    }
}
window.ontouchstart = handleTouch;
window.ontouchmove = handleTouch;
window.ontouchend = () => { joy.id = null; joy.x = 0; joy.y = 0; document.getElementById('joy-stick').style.transform = 'translate(0,0)'; };

function attack(dmg, range) {
    if(!player.hasW || player.atk) return;
    player.atk = true;
    setTimeout(() => {
        const d = Math.hypot(enemy.x-player.x, enemy.z-player.z);
        if(d < range && enemy.hp > 0) { enemy.hp -= dmg; enemy.flash = 5; }
        player.atk = false;
    }, 200);
}

function loop() {
    if(gameRunning) {
        let mx = 0, mz = 0;
        if(keys['KeyW']) mz -= 1; if(keys['KeyS']) mz += 1;
        if(keys['KeyA']) mx -= 1; if(keys['KeyD']) mx += 1;
        
        if(Math.hypot(mx, mz) > 0) player.ang = Math.atan2(mz, mx);
        else if(Math.hypot(joy.x, joy.y) > 5) player.ang = Math.atan2(joy.y, joy.x) + Math.PI/4;

        if(Math.hypot(mx, mz) > 0 || Math.hypot(joy.x, joy.y) > 5) {
            player.x += Math.cos(player.ang) * player.spd;
            player.z += Math.sin(player.ang) * player.spd;
        }

        player.y += player.vY; player.vY -= 0.8; if(player.y < 0) { player.y = 0; player.vY = 0; }
        
        if(enemy.hp > 0) {
            const d = Math.hypot(player.x-enemy.x, player.z-enemy.z);
            const a = Math.atan2(player.z-enemy.z, player.x-enemy.x);
            if(d < 400 && d > 40) { enemy.x += Math.cos(a)*enemy.spd; enemy.z += Math.sin(a)*enemy.spd; }
        }

        if(!chest.open && Math.hypot(player.x-chest.x, player.z-chest.z) < 40) {
            chest.open = true; player.hasW = true;
            buttons.atk1.style.display = 'flex'; buttons.atk2.style.display = 'flex';
        }
        document.getElementById('hp-p').innerText = Math.ceil(player.hp);
        document.getElementById('hp-e').innerText = Math.max(0, Math.ceil(enemy.hp));
    }
    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save(); ctx.translate(canvas.width/2 - (player.x-player.z)*0.7, canvas.height/2 - (player.x+player.z)/2.8);
    
    // Inimigo
    if(enemy.hp > 0) {
        ctx.fillStyle = enemy.flash > 0 ? '#fff' : '#e74c3c';
        ctx.fillRect((enemy.x-enemy.z)-20, (enemy.x+enemy.z)/2 - 50, 40, 50);
        if(enemy.flash > 0) enemy.flash--;
    }
    // Baú
    if(!chest.open) { ctx.fillStyle = '#f1c40f'; ctx.fillRect((chest.x-chest.z)-20, (chest.x+chest.z)/2 - 20, 40, 20); }
    // Jogador
    ctx.fillStyle = '#3498db';
    ctx.fillRect((player.x-player.z)-15, (player.x+player.z)/2 - 40 - player.y, 30, 40);
    
    ctx.restore();
}
loop();
</script>
</body>
</html>
