<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adventure Join V15.3 - Estável</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #050507; touch-action: none; font-family: sans-serif; width: 100vw; height: 100vh; position: fixed; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #start-btn { padding: 20px 50px; font-size: 24px; font-weight: bold; color: white; background: #00d4ff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0,212,255,0.5); }
        
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 100; pointer-events: none; }
        .hp-bar { width: 150px; height: 10px; background: #333; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #hp-p-bar { height: 100%; width: 100%; background: #44ff88; transition: 0.3s; }
        #hp-e-bar { height: 100%; width: 100%; background: #ff4444; transition: 0.3s; }

        .btn { position: absolute; width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; pointer-events: auto; }
        #joy-bg { position: absolute; bottom: 40px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.7); border-radius: 50%; pointer-events: none; }
        #btn-jump { bottom: 130px; right: 30px; }
        #btn-roll { bottom: 40px; right: 30px; border-color: orange; }
        #btn-atk1 { bottom: 130px; right: 120px; border-color: #00d4ff; display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>ADVENTURE JOIN</h1>
    <p style="margin-bottom: 20px; color: #aaa;">PC: WASD + K | Mobile: Touch</p>
    <button id="start-btn">JOGAR AGORA</button>
</div>

<div id="ui">
    <div>HERÓI <div class="hp-bar"><div id="hp-p-bar"></div></div></div>
    <div style="margin-top: 15px;">INIMIGO <div class="hp-bar"><div id="hp-e-bar"></div></div></div>
</div>

<div id="joy-bg"><div id="joy-stick"></div></div>
<div id="btn-jump" class="btn">PULO</div>
<div id="btn-roll" class="btn">ROLL</div>
<div id="btn-atk1" class="btn">ATAQUE</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let running = false;

document.getElementById('start-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'none';
    running = true;
};

let p = { x:0, z:0, y:0, vY:0, ang:0, spd:5, hp:100, sword:false, atk:false };
let e = { x:-200, z:200, hp:50, spd:1.8, flash:0 };
let chest = { x:150, z:150, open:false };
let keys = {};
let joy = { id: null, dx: 0, dy: 0 };

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();

window.onkeydown = (ev) => keys[ev.code] = true;
window.onkeyup = (ev) => keys[ev.code] = false;

// Touch Handlers
canvas.addEventListener('touchstart', (ev) => {
    for(let t of ev.touches) {
        const j = document.getElementById('joy-bg').getBoundingClientRect();
        if(Math.hypot(t.clientX-(j.left+60), t.clientY-(j.top+60)) < 80) joy.id = t.identifier;
        
        const bJ = document.getElementById('btn-jump').getBoundingClientRect();
        if(t.clientX > bJ.left && t.clientX < bJ.right && t.clientY > bJ.top && t.clientY < bJ.bottom && p.y === 0) p.vY = 12;
        
        const bA = document.getElementById('btn-atk1').getBoundingClientRect();
        if(t.clientX > bA.left && t.clientX < bA.right && t.clientY > bA.top && t.clientY < bA.bottom) doAtk();
    }
});

canvas.addEventListener('touchmove', (ev) => {
    for(let t of ev.touches) {
        if(t.identifier === joy.id) {
            const j = document.getElementById('joy-bg').getBoundingClientRect();
            joy.dx = Math.max(-40, Math.min(40, t.clientX-(j.left+60)));
            joy.dy = Math.max(-40, Math.min(40, t.clientY-(j.top+60)));
            document.getElementById('joy-stick').style.transform = `translate(${joy.dx}px,${joy.dy}px)`;
        }
    }
});

window.addEventListener('touchend', (ev) => {
    let active = false;
    for(let t of ev.touches) if(t.identifier === joy.id) active = true;
    if(!active) { joy.id = null; joy.dx = 0; joy.dy = 0; document.getElementById('joy-stick').style.transform = 'translate(0,0)'; }
});

function doAtk() {
    if(!p.sword || p.atk) return;
    p.atk = true;
    setTimeout(() => {
        if(Math.hypot(e.x-p.x, e.z-p.z) < 100) { e.hp -= 10; e.flash = 5; }
        p.atk = false;
    }, 150);
}

function update() {
    if(running) {
        let mx = 0, mz = 0;
        if(keys['KeyW']) mz -= 1; if(keys['KeyS']) mz += 1;
        if(keys['KeyA']) mx -= 1; if(keys['KeyD']) mx += 1;

        if(Math.hypot(mx, mz) > 0) { p.ang = Math.atan2(mz, mx); p.x += Math.cos(p.ang)*p.spd; p.z += Math.sin(p.ang)*p.spd; }
        else if(Math.hypot(joy.dx, joy.dy) > 5) { p.ang = Math.atan2(joy.dy, joy.dx) + Math.PI/4; p.x += Math.cos(p.ang)*p.spd; p.z += Math.sin(p.ang)*p.spd; }

        p.y += p.vY; p.vY -= 0.8; if(p.y < 0) { p.y = 0; p.vY = 0; }
        if(keys['KeyK']) doAtk();

        if(e.hp > 0) {
            let dist = Math.hypot(p.x-e.x, p.z-e.z);
            if(dist < 300 && dist > 40) {
                let angE = Math.atan2(p.z-e.z, p.x-e.x);
                e.x += Math.cos(angE)*e.spd; e.z += Math.sin(angE)*e.spd;
            }
        }

        if(!chest.open && Math.hypot(p.x-chest.x, p.z-chest.z) < 50) {
            chest.open = true; p.sword = true;
            document.getElementById('btn-atk1').style.display = 'flex';
        }

        document.getElementById('hp-p-bar').style.width = p.hp + "%";
        document.getElementById('hp-e-bar').style.width = (e.hp*2) + "%";
    }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(0.8, 0.8);

    const toIso = (x, z) => ({ x: x - z, y: (x + z) / 2 });

    // Cenário (Baú)
    if(!chest.open) {
        let pos = toIso(chest.x - p.x, chest.z - p.z);
        ctx.fillStyle = '#f1c40f'; ctx.fillRect(pos.x-20, pos.y-20, 40, 30);
    }

    // Inimigo
    if(e.hp > 0) {
        let pos = toIso(e.x - p.x, e.z - p.z);
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#e74c3c';
        ctx.fillRect(pos.x-20, pos.y-50, 40, 60);
        if(e.flash > 0) e.flash--;
    }

    // Jogador (Sempre no centro)
    ctx.fillStyle = '#3498db';
    ctx.fillRect(-15, -40 - p.y, 30, 50);
    if(p.atk) { ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(0, -20, 60, 0, Math.PI*2); ctx.stroke(); }

    ctx.restore();
}
update();
</script>
</body>
</html>
